<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DECLASSIFIED // Intelligence Feed</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: 'Share Tech Mono', monospace; background: #0a0a08; color: #ddd; margin: 0; padding: 0; }
    .header { background: #111; padding: 10px; text-align: center; border-bottom: 2px solid #cc2222; }
    .tabs { display: flex; background: #1a1a1a; }
    .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; }
    .tab.active { background: #cc2222; color: white; }
    .container { max-width: 900px; margin: 20px auto; padding: 20px; }
    textarea { width: 100%; height: 200px; background: #111; color: #ddd; border: 1px solid #444; padding: 10px; font-family: inherit; }
    button { background: #cc2222; color: white; border: none; padding: 12px 24px; font-size: 16px; cursor: pointer; margin-top: 10px; }
    .card { background: #1a1a1a; border: 1px solid #444; padding: 15px; margin: 15px 0; border-radius: 4px; }
    .error { color: #ff4444; background: #330000; padding: 10px; border: 1px solid #ff4444; }
    mark { background: #ff0; color: #000; padding: 2px 4px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>★ DECLASSIFIED INTELLIGENCE FEED ★</h1>
    <p>● Online</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab(0)">⚡ Analyze</div>
    <div class="tab" onclick="switchTab(1)">📡 Feed</div>
    <div class="tab" onclick="switchTab(2)">📂 Saved</div>
  </div>

  <div class="container" id="analyze-tab">
    <h2>Raw Document Input</h2>
    <textarea id="document-text" placeholder="Paste declassified document text here..."></textarea>
    <button onclick="extractIntelligence()">⚡ Extract Intelligence</button>
    <div id="status" style="margin-top: 10px;"></div>
  </div>

  <div class="container" id="feed-tab" style="display: none;">
    <h2>Intelligence Feed</h2>
    <div id="intelligence-feed">No active feed yet. Analyze a document first.</div>
  </div>

  <script>
    function switchTab(n) {
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n));
      document.getElementById('analyze-tab').style.display = n===0 ? 'block' : 'none';
      document.getElementById('feed-tab').style.display = n===1 ? 'block' : 'none';
    }

    async function extractIntelligence() {
      const text = document.getElementById('document-text').value.trim();
      const statusEl = document.getElementById('status');
      
      if (!text || text.length < 50) {
        statusEl.innerHTML = '<div class="error">❌ Please paste at least 50 characters of document text.</div>';
        return;
      }

      statusEl.innerHTML = '<p>🔍 Analyzing with Groq Llama 3.3 70B... (this may take 10-30 seconds)</p>';

      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: text })
        });

        if (!res.ok) {
          throw new Error(`HTTP error! Status: ${res.status}`);
        }

        const data = await res.json();

        if (data.error) {
          throw new Error(data.error);
        }

        // Render the feed
        renderFeed(data);
        statusEl.innerHTML = '<p style="color:#22cc22;">✅ Analysis complete!</p>';
        switchTab(1); // Switch to Feed tab

      } catch (err) {
        console.error(err);
        statusEl.innerHTML = `<div class="error">❌ Error: ${err.message}</div>`;
      }
    }

    function renderFeed(data) {
      const container = document.getElementById('intelligence-feed');
      let html = `
        <div style="margin-bottom:15px;">
          <strong>Source:</strong> ${data.source_agency || 'Unknown'} | 
          <strong>Period:</strong> ${data.time_period || 'Unknown'} | 
          <strong>Level:</strong> ${data.classification_level || 'Unknown'}
        </div>`;

      if (data.findings && data.findings.length) {
        data.findings.forEach(f => {
          html += `
            <div class="card">
              <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
                <span style="font-size:24px;">${f.avatar || '🔍'}</span>
                <strong>${f.handle || '@Unknown'}</strong>
              </div>
              <div style="line-height:1.5;">${f.tweet || f.text || ''}</div>
              <div style="margin-top:10px; font-size:0.9em; color:#888;">
                Shock Level: <strong style="color:#ff4444;">${f.shock_level || 'NOTABLE'}</strong> 
                • ${f.timestamp || 'Recently declassified'}
              </div>
            </div>`;
        });
      } else {
        html += '<p>No findings returned.</p>';
      }

      container.innerHTML = html;
    }

    // Default to Analyze tab
    switchTab(0);
  </script>
</body>
</html>
