<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DECLASSIFIED // Intelligence Feed</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs" type="module"></script>
  <style>
    :root { --red: #cc2222; }
    body { font-family: 'Share Tech Mono', monospace; background: #0a0a08; color: #ddd; margin:0; padding:0; }
    .header { background:#111; padding:15px; text-align:center; border-bottom:3px solid var(--red); }
    .header h1 { margin:0; font-size:1.45rem; letter-spacing:3px; }
    .tabs { display:flex; background:#1a1a1a; }
    .tab { flex:1; padding:16px; text-align:center; cursor:pointer; }
    .tab.active { background:var(--red); color:white; font-weight:bold; }
    .container { max-width:960px; margin:25px auto; padding:0 15px; }
    .drag-area { 
      border: 3px dashed #666; 
      border-radius: 12px; 
      padding: 70px 20px; 
      text-align: center; 
      background: #111; 
      cursor: pointer; 
      transition: 0.3s;
    }
    .drag-area.dragover { border-color: var(--red); background:#1a1a1a; }
    textarea { width:100%; height:260px; background:#111; border:1px solid #444; color:#ddd; padding:15px; resize:vertical; }
    button { background:var(--red); color:white; border:none; padding:16px; width:100%; margin-top:12px; font-size:1.1rem; cursor:pointer; }
    .ocr-btn { background:#ff8800; }
    .status { margin:15px 0; padding:14px; border-radius:6px; }
    .success { background:#003300; color:#88ff88; }
    .error { background:#330000; color:#ff8888; }
  </style>
</head>
<body>

  <div class="header">
    <h1>★ DECLASSIFIED INTELLIGENCE FEED ★</h1>
    <p>AUTHORIZED PERSONNEL ONLY • AI-POWERED ANALYSIS</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab(0)">⚡ Analyze</div>
    <div class="tab" onclick="switchTab(1)">📡 Feed</div>
  </div>

  <div class="container" id="tab-0">
    <div class="drag-area" id="drop-zone">
      <strong>📁 Drop Declassified Document Here</strong><br>
      <span style="color:#888;">or click to select PDF / TXT file</span>
      <input type="file" id="file-input" accept=".txt,.pdf" style="display:none;">
    </div>

    <h3 style="margin:25px 0 10px;">Or Paste Document Text</h3>
    <textarea id="document-text" placeholder="Text will appear here after file upload..."></textarea>
    <div id="word-count" style="text-align:right; color:#888; margin-top:5px;">0 words</div>

    <button onclick="extractIntelligence()">⚡ Extract Intelligence</button>
    <button id="ocr-button" onclick="runOCR()" class="ocr-btn" style="display:none;">🔍 Enhance with OCR (scanned/redacted)</button>

    <div id="analyze-status" class="status"></div>
  </div>

  <div class="container" id="tab-1" style="display:none;">
    <h2>Intelligence Feed</h2>
    <div id="intelligence-feed">Analyze a document first.</div>
  </div>

  <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.mjs';

    let currentPdfFile = null;

    function switchTab(n) {
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n));
      document.getElementById('tab-0').style.display = n===0 ? 'block' : 'none';
      document.getElementById('tab-1').style.display = n===1 ? 'block' : 'none';
    }

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    fileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) handleFile(file);
    });

    async function handleFile(file) {
      currentPdfFile = file;
      document.getElementById('ocr-button').style.display = 'none';

      const status = document.getElementById('analyze-status');
      status.className = "status";
      status.innerHTML = `Processing <strong>${file.name}</strong>...`;

      if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) {
        try {
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          let fullText = '';

          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const text = await page.getTextContent();
            fullText += text.items.map(item => item.str).join(' ') + '\n\n';
          }

          document.getElementById('document-text').value = fullText.trim();
          updateWordCount();

          status.className = "status success";
          status.innerHTML = `✅ Successfully extracted text from ${pdf.numPages} pages.<br>If the result looks incomplete, click the OCR button.`;
          document.getElementById('ocr-button').style.display = 'block';
        } catch (err) {
          status.className = "status error";
          status.innerHTML = "❌ Could not read the PDF file.";
        }
      } else {
        const reader = new FileReader();
        reader.onload = ev => {
          document.getElementById('document-text').value = ev.target.result;
          updateWordCount();
          status.className = "status success";
          status.innerHTML = "✅ Text file loaded.";
        };
        reader.readAsText(file);
      }
    }

    function updateWordCount() {
      const text = document.getElementById('document-text').value.trim();
      const count = text.split(/\s+/).filter(Boolean).length;
      document.getElementById('word-count').textContent = `${count} words`;
    }

    async function extractIntelligence() {
      alert("✅ File handling is now fixed.\n\nPaste some text or try uploading the PDF again.");
    }

    async function runOCR() {
      alert("OCR button ready (placeholder for now).");
    }

    // Start
    switchTab(0);
  </script>
</body>
</html>
